name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    name: Lint / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Create venv and install (dev + base — ml extras skipped in CI to keep image small)
        run: |
          uv venv
          uv pip install -e '.[dev]'

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy --ignore-missing-imports src/lfimaging || true

      - name: Pytest
        env:
          # Skip network-dependent Cellpose weight download; fallback segmenter runs.
          LF_SKIP_CELLPOSE_DOWNLOAD: "1"
        run: uv run pytest -v

  docker-build:
    name: Docker sanity build
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t laminarforge/imaging-ml:ci .
