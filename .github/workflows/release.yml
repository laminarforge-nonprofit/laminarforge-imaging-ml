name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker-publish:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "repo_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.tag.outputs.repo_lower }}/imaging-ml:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ steps.tag.outputs.repo_lower }}/imaging-ml:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker image published to:
            `ghcr.io/${{ steps.tag.outputs.repo_lower }}/imaging-ml:${{ steps.tag.outputs.tag }}`
